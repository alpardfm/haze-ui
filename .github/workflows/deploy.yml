name: Deploy Haze UI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: haze-ui-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://alpardfm.my.id/api/haze

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/haze_ui_deploy_key
          chmod 600 ~/.ssh/haze_ui_deploy_key
          ssh-keyscan -H 103.87.67.209 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/haze_ui_deploy_key alpardfm@103.87.67.209 "mkdir -p /var/www/alpardfm.my.id/haze"
          rsync -az --delete -e "ssh -i ~/.ssh/haze_ui_deploy_key" dist/ alpardfm@103.87.67.209:/var/www/alpardfm.my.id/haze/
